<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PokéBlog - Cadastro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <nav class="navbar navbar-dark bg-danger">
    <div class="container">
      <a class="navbar-brand" href="index.html">PokéBlog</a>
      <div>
        <a class="text-white me-3" href="index.html">Início</a>
        <a class="text-white me-3" href="conteudo.html">Pokémons</a>
        <a class="text-white" href="cadastro.html">Cadastro</a>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h1>Cadastro de Treinador</h1>
    <p class="text-muted">Preencha seus dados para entrar no PokéBlog.</p>

    <form>
      <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" class="form-control" placeholder="Seu nome">
      </div>

      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-control" placeholder="email@exemplo.com">
      </div>

      <div class="mb-3">
        <label class="form-label">Pokémon favorito</label>
        <input type="text" class="form-control" placeholder="Ex: Pikachu">
      </div>

      <button type="submit" class="btn btn-danger">Cadastrar</button>
    </form>
  </div>

  <footer class="bg-danger text-white text-center py-3">
    <small>&copy; 2026 PokéBlog — ADS1241</small>
  </footer>

</body>
</html>
